<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>遺品が散乱する部屋</title>
    <style>
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'MS Mincho', 'serif';
            margin: 0;
            padding: 0;
            height: 100%;
            position: relative; /* 画面内に物を自由に散りばめるための設定 */
            user-select: none;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            color: #444444;
            padding-top: 30px;
            letter-spacing: 5px;
        }

        .instruction {
            text-align: center;
            font-size: 13px;
            color: #222222;
            margin-top: 5px;
        }

        /* 📦 部屋の中に配置するすべてのオブジェクト（共通設定） */
        .room-object {
            position: absolute;
            cursor: pointer;
            transition: 0.3s;
            background: none;
            border: none;
            outline: none;
            padding: 10px;
        }
        
        /* マウスを乗せた時にうっすらと怪しく浮かび上がらせる */
        .room-object:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.5));
        }

        /* 🪟 テキストや絵文字の見た目 */
        .obj-icon { font-size: 32px; display: block; text-align: center; }
        .obj-name { font-size: 11px; color: #444444; display: block; margin-top: 5px; }

        /* 🔒 画面下部にある、コードを入力するボックス */
        .code-input-area {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #050505;
            border: 1px solid #222222;
            padding: 20px 40px;
            text-align: center;
        }

        .code-input-area input {
            background-color: #000000;
            border: 1px solid #444444;
            color: #ff0000;
            font-size: 22px;
            width: 120px;
            text-align: center;
            padding: 5px;
            outline: none;
            letter-spacing: 5px;
        }

        .code-input-area button {
            display: block;
            margin: 15px auto 0 auto;
            background-color: #111111;
            color: #888888;
            border: 1px solid #333333;
            padding: 5px 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .code-input-area button:hover { background-color: #ffffff; color: #000000; }

        /* ❌ はずれ・ゲームオーバー画面（最初は隠す） */
        #fail-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ffffff; color: #000000; z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
            font-family: 'MS Gothic', sans-serif;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>なんかいろいろおいてある部屋</h1>
    <div class="instruction">――調べる価値のあるものは、どれだ？――</div>

    <!-- 🟢 【本物】設計図通りの4色の呪いの人形たち（ランダムな位置に配置） -->
    <button class="room-object" style="top: 25%; left: 15%;" onclick="examine('doll', '🔴')">
        <span class="obj-icon">🧸</span><span class="obj-name">赤いお人形</span>
    </button>
    <button class="room-object" style="top: 60%; left: 75%;" onclick="examine('doll', '🔵')">
        <span class="obj-icon">🧸</span><span class="obj-name">青いお人形</span>
    </button>
    <button class="room-object" style="top: 15%; left: 65%;" onclick="examine('doll', '🟢')">
        <span class="obj-icon">🧸</span><span class="obj-name">緑のお人形</span>
    </button>
    <button class="room-object" style="top: 55%; left: 20%;" onclick="examine('doll', '🟡')">
        <span class="obj-icon">🧸</span><span class="obj-name">黄色いお人形</span>
    </button>

    <!-- ❌ 【ダミー】プレイヤーを迷わせる、偽物の家具やがらくた群 -->
    <button class="room-object" style="top: 40%; left: 45%;" onclick="examine('fake', '🪞')">
        <span class="obj-icon">🪞</span><span class="obj-name">古びた鏡</span>
    </button>
    <button class="room-object" style="top: 18%; left: 35%;" onclick="examine('fake', '⏳')">
        <span class="obj-icon">⏳</span><span class="obj-name">壊れた砂時計</span>
    </button>
    <button class="room-object" style="top: 65%; left: 48%;" onclick="examine('fake', '📖')">
        <span class="obj-icon">📖</span><span class="obj-name">破かれた日記</span>
    </button>
    <button class="room-object" style="top: 35%; left: 75%;" onclick="examine('fake', '🧱')">
        <span class="obj-icon">🧱</span><span class="obj-name">崩れたレンガ</span>
    </button>
    <button class="room-object" style="top: 45%; left: 10%;" onclick="examine('fake', '🖼️')">
        <span class="obj-icon">🖼️</span><span class="obj-name">傾いた絵画</span>
    </button>


    <!-- 🔒 画面下の暗号入力欄 -->
    <div class="code-input-area">
        <input type="text" id="answerField" maxlength="4" placeholder="????" onkeydown="if(event.key==='Enter') checkCode()">
        <button onclick="checkCode()">決定</button>
    </div>


    <!-- ❌ 【不正解】はずれ画面（バグ風） -->
    <div id="fail-screen">
        <h2 style="font-size: 36px;">ERROR</h2>
        <p style="color: #666666;">ちがう。ここから出しはしない。</p>
        <a href="index.html" style="color: #000000; text-decoration: none; border: 1px solid #000000; padding: 10px 30px; margin-top: 40px;">最初からやり難す</a>
    </div>


    <script {nonce}>
        // 物を調べたときのメッセージ判定
        function examine(type, name) {
            if (type === 'doll') {
                if (name === '🔴') alert('赤い人形の台座に【9】と傷がついている。');
                if (name === '🔵') alert('青い人形の背中に【1】と書かれている。');
                if (name === '🟢') alert('緑の人形の目が【3】の形をしている。');
                if (name === '🟡') alert('黄色い人形の足元に【0】と転がっている。');
            } else {
                if (name === '🪞') alert('鏡には何も映っていない。自分の顔すらも。');
                if (name === '⏳') alert('砂はすでに落ちきっている。時は止まった。');
                if (name === '📖') alert('日記のページはすべて真っ黒に塗りつぶされている。');
                if (name === '🧱') alert('ただの瓦礫だ。');
                if (name === '🖼️') alert('不気味な人物の肖像画だ。目が動いた気がした。');
            }
        }

        // 暗号「9130」の入力判定
        function checkCode() {
            var val = document.getElementById("answerField").value;
            // 💡 設計図通り、正解すると「迷路（maze-room.html）」へ進みます！
            if (val === "9130") {
                window.location.href = "maze-room.html";
            } else {
                document.getElementById("fail-screen").style.display = "flex";
            }
        }

        // デベロッパーツール対策
        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
