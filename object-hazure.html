<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>はずれ</title>
    <style>
        html, body {
            background-color: #000000;
            color: #d60000; /* 血のような赤色 */
            font-family: 'MS Mincho', 'serif';
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            overflow: hidden;
            position: relative; /* 🗺️ 角にボタンを固定するために必要 */
        }

        /* 👁️ 左上の角に配置する完全隠しボタンの設定 */
        .hidden-warp-btn {
            position: fixed;
            top: 0;
            left: 0;
            width: 60px;
            height: 60px;
            border: none;
            outline: none;
            /* 💡 背景の赤点滅アニメーションと完全に同期させて完全にステルス化 */
            animation: redAlert 0.5s infinite alternate; 
            cursor: default; /* マウスを乗せても矢印のままでバレません */
            z-index: 999;
        }

        /* 画面全体が赤く点滅する不気味な演出 */
        body {
            animation: redAlert 0.5s infinite alternate;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 15px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #ff0000;
        }

        .message {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 60px;
        }

        /* 最初に戻るボタン */
        .retry-btn {
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            border: 1px solid #ffffff;
            padding: 15px 40px;
            transition: 0.3s;
        }

        .retry-btn:hover {
            color: #000000;
            background-color: #ffffff;
            box-shadow: 0 0 15px #ffffff;
        }

        /* 画面点滅のアニメーション */
        @keyframes redAlert {
            0% { background-color: #000000; }
            100% { background-color: #1a0000; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- 👁️ 左上の完全隠しボタン（大きさは 60px × 60px の正方形です） -->
    <button class="hidden-warp-btn" onclick="secretWarp()"></button>

    <h1>は ず れ</h1>
    
    <div class="message">
        あなたは罠に引っかかってしまった……。
    </div>

    <!-- 💡 通常の選択：最初のトップページ（index.html）に強制送還 -->
    <a href="index.html" class="retry-btn">最初からやり直す</a>

    <!-- デベロッパーツール対策 -->
    <script {nonce}>
        // 💡 左上の隠しボタンを押したときに発動するワープ
        function secretWarp() {
            alert("見つかっちゃった...");
            // 🗺️ 設計図通り、元のobject-roomへ戻りますが、
            // 隠しコードイベントを起こすために「?secret=true」という目印を付けて戻ります！
            window.location.href = "object-room.html?secret=true"; 
        }

        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
