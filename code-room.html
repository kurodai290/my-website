<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>最深部：暗号の扉</title>
    <style>
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'MS Mincho', 'serif';
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            overflow: hidden;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            letter-spacing: 8px;
            margin-bottom: 20px;
        }

        .hint {
            color: #555555;
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* 🔒 金庫のような入力エリア */
        .lock-container {
            background-color: #0a0a0a;
            border: 2px solid #333333;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.1);
            text-align: center;
        }

        /* 数字を入力する四角いボックス */
        input {
            background-color: #000000;
            border: 1px solid #555555;
            color: #ff0000; /* 不気味な赤色の文字 */
            font-size: 32px;
            font-family: monospace;
            width: 160px;
            text-align: center;
            padding: 10px;
            outline: none;
            letter-spacing: 5px;
        }

        input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        /* 決定ボタン */
        .submit-btn {
            display: block;
            margin: 30px auto 0 auto;
            background-color: #111111;
            color: #ffffff;
            border: 1px solid #444444;
            padding: 10px 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        /* ❌ 間違えた時のはずれ画面（最初は隠しておく） */
        #fail-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ffffff; /* 白画面バグ風 */
            color: #000000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'MS Gothic', sans-serif;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>最深部：暗号の扉</h1>
    <div class="hint">――4つの人形が指し示した、4桁のコードを刻め――</div>

    <div class="lock-container">
        <!-- 4桁制限の入力欄 -->
        <input type="text" id="codeField" maxlength="4" placeholder="????" onkeydown="if(event.key==='Enter') verifyCode()">
        <button class="submit-btn" onclick="verifyCode()">決定</button>
    </div>

    <!-- ❌ 【不正解】はずれ画面（無音バグ風） -->
    <div id="fail-screen">
        <h2 style="font-size: 36px;">ERROR</h2>
        <p style="color: #666666;">ちがう。ここから出しはしない。</p>
        <a href="index.html" style="color: #000000; text-decoration: none; border: 1px solid #000000; padding: 10px 30px; margin-top: 40px;">最初からやり直す</a>
    </div>

    <script {nonce}>
        function verifyCode() {
            var inputVal = document.getElementById("codeField").value;
            
            // 💡 正しいコード「9130」を入れると、クリア画面は出さずに「迷路（maze-room.html）」へ飛ばします！
            if (inputVal === "9130") {
                window.location.href = "maze-room.html";
            } else {
                document.getElementById("fail-screen").style.display = "flex";
            }
        }

        // デベロッパーツール対策
        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
