<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>なんかいろいろおいてある部屋</title>
    <style>
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'MS Mincho', 'serif';
            margin: 0;
            padding: 0;
            height: 100%;
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            color: #555555;
            padding-top: 30px;
        }

        .scat-item {
            position: absolute;
            color: #333333;
            font-size: 14px;
        }

        .doll {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            cursor: pointer;
            transition: 0.5s;
        }
        .doll:hover {
            text-shadow: 0 0 10px #ff0000;
        }

        #scare-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .scare-text {
            color: #ff0000;
            font-size: 80px;
            font-weight: bold;
            letter-spacing: 20px;
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-10px, 10px) rotate(-1deg); }
            40% { transform: translate(-10px, -10px) rotate(1deg); }
            60% { transform: translate(10px, 10px) rotate(0deg); }
            80% { transform: translate(10px, -10px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .death-link {
            margin-top: 50px;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #ffffff;
            padding: 10px 30px;
            font-size: 18px;
        }
        .death-link:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>なんかいろいろおいてある部屋</h1>

    <div class="scat-item" style="top: 20%; left: 15%;">壊れた椅子</div>
    <div class="scat-item" style="top: 25%; left: 70%;">破かれた日記</div>
    <div class="scat-item" style="top: 75%; left: 30%;">古い空き箱</div>
    <div class="scat-item" style="top: 60%; left: 80%;">ガラスの破片</div>

    <div class="doll" onclick="startScare()">🧸</div>

    <div id="scare-screen">
        <div class="scare-text">9130</div>
        <a href="index.html" class="death-link">最初に戻る</a>
    </div>

    <script {nonce}>
        function startScare() {
            document.getElementById("scare-screen").style.display = "flex";
        }

        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
