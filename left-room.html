<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>左の部屋</title>
    <style>
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'MS Mincho', 'serif';
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        .subtitle {
            color: #888888;
            font-size: 16px;
            margin-bottom: 60px;
        }

        /* 🗺️ マップ通りの分岐ボタンの並び */
        .choice-container {
            display: flex;
            gap: 40px;
        }

        .choice-btn {
            color: #ffffff;
            text-decoration: none;
            font-size: 20px;
            border: 1px solid #444444;
            padding: 20px 50px;
            transition: 0.4s;
            background-color: #050505;
        }

        .choice-btn:hover {
            color: #ff0000;
            border-color: #ff0000;
            background-color: #1a0000;
            box-shadow: 0 0 15px #ff0000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>左の部屋</h1>
    <div class="subtitle">――静まり返った部屋。奥に2つの道がある。――</div>

    <!-- 🗺️ 設計図通りの分岐 -->
    <div class="choice-container">
        <!-- クリックすると「はずれ（left-hazure.html）」へ -->
        <a href="left-hazure.html" class="choice-btn">奥の通路</a>
        
        <!-- クリックすると「なんかいろいろおいてある部屋（item-room.html）」へ -->
        <a href="item-room.html" class="choice-btn">不気味な扉</a>
    </div>

    <!-- デベロッパーツール対策 -->
    <script>
        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
