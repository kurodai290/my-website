<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>オブジェクトの間</title>
    <style>
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'MS Mincho', 'serif';
            margin: 0; padding: 0; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            user-select: none; overflow: hidden;
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        .hint {
            color: #555555;
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* 📦 オブジェクトが並ぶエリア */
        .shelf-container {
            background-color: #0a0a0a;
            border: 2px solid #222222;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
        }

        /* 選択肢ボタン */
        .obj-btn {
            background-color: #111111;
            color: #ffffff;
            border: 1px solid #444444;
            padding: 20px 30px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'MS Mincho', 'serif';
            border-radius: 3px;
        }
        .obj-btn:hover {
            color: #000000;
            background-color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* メッセージ表示エリア */
        .message-box {
            font-size: 18px;
            color: #ff0000;
            min-height: 40px;
            letter-spacing: 2px;
            margin-top: 10px;
            font-weight: bold;
        }

        /* 次の部屋（コード入力）への移動リンク */
        .nav-btn {
            display: none; /* あたりを見つけるまでは隠しておく */
            margin-top: 40px;
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #ff0000;
            padding: 12px 35px;
            font-size: 16px;
            text-decoration: none;
            transition: 0.3s;
            font-weight: bold;
        }
        .nav-btn:hover {
            background-color: #ff0000;
            color: #000000;
        }

        /* ⚠️ 画面赤フラッシュ演出用 */
        #flash-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #8b0000;
            z-index: 9999;
        }

        /* 🔍 角に見えないボタン（透明な隠しボタン） */
        .hidden-corner-btn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: transparent;
            border: none;
            cursor: default;
            z-index: 10;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="flash-screen"></div>

    <h1>左の間：object-room</h1>
    <div class="hint">――隠された部屋。いくつかの物体が冷たく鎮座している――</div>

    <div class="shelf-container">
        <!-- 想定図に基づいた「はずれ」と「あたり」の分岐ボタン -->
        <button class="obj-btn" onclick="interactObj('hazure1')">左の物体</button>
        <button class="obj-btn" onclick="interactObj('atari')">中央の物体</button>
        <button class="obj-btn" onclick="interactObj('hazure2')">右の物体</button>
    </div>

    <!-- メッセージを表示するエリア -->
    <div id="messageDisplay" class="message-box"></div>

    <!-- あたりを押すと出現する、コード入力部屋へのリンク -->
    <div>
        <a href="code-room2.html" id="nextRoomLink" class="nav-btn">コード入力パネルへ進む</a>
    </div>

    <!-- 🔍 想定図の下矢印：角にまた見えないボタン設置 -->
    <button class="hidden-corner-btn" onclick="interactObj('secret')"></button>

    <script>
        function interactObj(type) {
            const msg = document.getElementById("messageDisplay");
            const flash = document.getElementById("flash-screen");
            const nextLink = document.getElementById("nextRoomLink");

            if (type === 'hazure1' || type === 'hazure2') {
                // はずれを選択：ゲームオーバー（お好みのハズレ部屋ファイルに変えてください）
                flash.style.display = "block";
                setTimeout(() => {
                    alert("不気味なノイズが頭の中に響き渡った。");
                    window.location.href = "object-hazure.html"; 
                }, 100);

            } else if (type === 'atari') {
                // あたりを選択：コード入力部屋への道が開く
                msg.innerText = "何かがカチリと噛み合う音がした。進む道が現れたようだ。";
                msg.style.color = "#00ffcc";
                nextLink.style.display = "inline-block"; // ボタンを表示

            } else if (type === 'secret') {
                // 画面右下の角にある、見えない隠しボタンを押した場合
                msg.style.color = "#ff0000";
                msg.innerText = "壁の隙間に数字が刻まれている……「93487543987329」";
            }
        }

        // デベロッパーツール対策
        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
