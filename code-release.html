<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>機密コード公開</title>
    <style>
        html, body {
            background-color: #000000;
            color: #00ff66; /* サイバー感のあるネオングリーン */
            font-family: monospace;
            margin: 0; padding: 0; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            user-select: none; overflow: hidden;
        }

        .terminal-box {
            background-color: #050505;
            border: 1px solid #00ff66;
            padding: 40px;
            max-width: 650px;
            width: 85%;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.15);
            position: relative;
        }

        /* 🟢 画面の走査線（レトロPC風）のエフェクト */
        .terminal-box::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 4px;
            margin-bottom: 30px;
            color: #00ff66;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        .status-log {
            text-align: left;
            font-size: 14px;
            color: #888888;
            margin-bottom: 30px;
            line-height: 1.6;
            border-bottom: 1px solid #222222;
            padding-bottom: 20px;
        }

        /* 🔑 公開される最重要コードの表示エリア */
        .code-display {
            background-color: #000;
            border: 1px dashed #00ff66;
            padding: 25px;
            margin: 20px 0;
            border-radius: 4px;
        }

        .code-label {
            font-size: 13px;
            color: #888888;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .code-value {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 0 15px #00ff66;
        }

        /* トップへ戻るボタン */
        .exit-btn {
            display: inline-block;
            margin-top: 30px;
            background-color: #001100;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 12px 40px;
            font-size: 15px;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            letter-spacing: 2px;
        }
        .exit-btn:hover {
            background-color: #00ff66;
            color: #000000;
            box-shadow: 0 0 15px #00ff66;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="terminal-box">
        <h1>[ SYSTEM COMPLETED: CODE RELEASE ]</h1>
        
        <div class="status-log">
            &gt; ACCESS GRANTED...<br>
            &gt; DECRYPTING DATABASE SYSTEM... DONE.<br>
            &gt; CORE CODE UNLOCKED SUCCESSFUL.
        </div>

        <!-- 💡 隠しルートで手に入れた核心的なコードだけを表示 -->
        <div class="code-display">
            <div class="code-label">☣️ 深淵の最重要機密コード</div>
            <div class="code-value">93487543987329</div>
        </div>

        <!-- タイトル画面等に戻るリンク -->
        <a href="index.html" class="exit-btn">システムを終了する</a>
    </div>

    <!-- デベロッパーツール対策 -->
    <script {nonce}>
        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
