<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>なんかいろいろおいてある部屋</title>
    <style>
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'MS Mincho', 'serif';
            margin: 0;
            padding: 0;
            height: 100%;
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            color: #555555;
            padding-top: 30px;
        }

        /* 📦 散乱している物のテキスト */
        .scat-item {
            position: absolute;
            color: #333333;
            font-size: 14px;
        }

        /* 🧸 部屋の真ん中にある不気味な人形 */
        .doll {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            cursor: pointer;
            transition: 0.5s;
        }
        .doll:hover {
            text-shadow: 0 0 10px #ff0000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>なんかいろいろおいてある部屋</h1>

    <!-- 散乱している物 -->
    <div class="scat-item" style="top: 20%; left: 15%;">壊れた椅子</div>
    <div class="scat-item" style="top: 25%; left: 70%;">破かれた日記</div>
    <div class="scat-item" style="top: 75%; left: 30%;">古い空き箱</div>
    <div class="scat-item" style="top: 60%; left: 80%;">ガラスの破片</div>

    <!-- 🧸 人形を触ると、設計図通り「コード入力部屋」へ進みます -->
    <div class="doll" onclick="goToCodeRoom()">🧸</div>

    <script {nonce}>
        function goToCodeRoom() {
            // 💡 触るとあなたのファイル「code-room.html」へワープします！
            window.location.href = "code-room.html";
        }

        // デベロッパーツール対策
        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
