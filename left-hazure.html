<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>はずれ</title>
    <style>
        html, body {
            background-color: #000000;
            color: #d60000; /* 血のような赤色 */
            font-family: 'MS Mincho', 'serif';
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            overflow: hidden;
            position: relative; /* 🗺️ 左上にボタンを固定するために必要 */
        }

        /* 👁️ 左上に配置する完全隠しボタンの設定 */
        .hidden-warp-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 60px;
            height: 60px;
            border: none;
            outline: none;
            /* 💡 重要：背景と同調して点滅させ、枠線も消すことで完全にステルス化します */
            animation: redAlert 0.5s infinite alternate; 
            cursor: default; /* マウスを乗せても指のマークに変わらず、矢印のままでバレません */
        }

        /* 画面全体が赤く点滅する不気味な演出 */
        body {
            animation: redAlert 0.5s infinite alternate;
        }

        h1 {
            font-size: 48px;
            letter-spacing: 15px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #ff0000;
        }

        .message {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 60px;
        }

        /* 最初に戻るボタン */
        .retry-btn {
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            border: 1px solid #ffffff;
            padding: 15px 40px;
            transition: 0.3s;
        }

        .retry-btn:hover {
            color: #000000;
            background-color: #ffffff;
            box-shadow: 0 0 15px #ffffff;
        }

        /* 画面点滅のアニメーション */
        @keyframes redAlert {
            0% { background-color: #000000; }
            100% { background-color: #1a0000; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- 👁️ 左上の完全隠しボタン（大きさは 60px × 60px の正方形です） -->
    <button class="hidden-warp-btn" onclick="secretWarp()"></button>

    <h1>は ず れ</h1>
    
    <div class="message">
        あなたは罠に引っかかってしまった……。
    </div>

    <!-- 💡 クリックすると一番最初のトップページ（index.html）に強制送還されます -->
    <a href="index.html" class="retry-btn">最初からやり直す</a>

    <!-- デベロッパーツール対策 -->
    <script {nonce}>
        // 💡 左上の隠しボタンを押したときに発動するワープ魔法
        function secretWarp() {
            alert("見つかっちゃった...");
            // 🗺️ ここに進ませたい次の部屋のファイル名を入力してください。
            // 今回は例として、新ルートの「color-room.html」へワープするようにしてあります！
            window.location.href = "color-room.html"; 
        }

        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
