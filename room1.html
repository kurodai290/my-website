
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>最初の部屋</title>
    <style>
        /* 画面を真っ黒にしてホラー感を継続 */
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'MS Mincho', 'serif';
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        h1 {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 50px;
        }

        /* 部屋の中に配置する怪しいメッセージやオブジェクト */
        .message-box {
            font-size: 18px;
            color: #888888;
            margin-bottom: 40px;
        }

        /* 次への手がかりとなるボタンやリンク */
        .choice-btn {
            color: #ff0000;
            text-decoration: none;
            font-size: 20px;
            border: 1px solid #ff0000;
            padding: 10px 30px;
            margin: 10px;
            transition: 0.3s;
        }
        .choice-btn:hover {
            background-color: #330000;
            box-shadow: 0 0 10px #ff0000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>第一の部屋：分かれ道</h1>
    
    <div class="message-box">
        「正しい道を選ばなければ、二度と戻れない」
    </div>

    <!-- プレイヤーに選ばせる選択肢（リンク先は仮です） -->
    <div>
        <a href="left-room.html" class="choice-btn">左の扉へ</a>
        <a href="right-room.html" class="choice-btn">右の扉へ</a>
    </div>

    <!-- デベロッパーツール対策のJavaScript -->
    <script>
        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
