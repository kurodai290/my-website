<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>なんかいろいろおいてある部屋</title>
    <style>
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'MS Mincho', 'serif';
            margin: 0;
            padding: 0;
            height: 100%;
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            color: #555555;
            padding-top: 30px;
        }

        /* 📦 物が散乱している様子を表現するテキスト */
        .scat-item {
            position: absolute;
            color: #333333; /* 普段は暗くて見えにくい */
            font-size: 14px;
        }

        /* 👁️ クリックすると発動する呪いの人形 */
        .doll {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px; /* 絵文字の人形を大きく表示 */
            cursor: pointer;
            transition: 0.5s;
        }
        .doll:hover {
            text-shadow: 0 0 10px #ff0000;
        }

        /* 😱 びっくり演出（ジャンプスケア）用の画面隠し */
        #scare-screen {
            display: none; /* 最初は隠しておく */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* 画面いっぱいに広がる恐怖のメッセージ */
        .scare-text {
            color: #ff0000;
            font-size: 80px;
            font-weight: bold;
            letter-spacing: 20px;
            animation: shake 0.1s infinite; /* 激しく揺れるアニメーション */
        }

        /* 画面が激しく揺れるアニメーションの設定 */
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-10px, 10px) rotate(-1deg); }
            40% { transform: translate(-10px, -10px) rotate(1deg); }
            60% { transform: translate(10px, 10px) rotate(0deg); }
            80% { transform: translate(10px, -10px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* 強制ゲームオーバーから戻るボタン */
        .death-link {
            margin-top: 50px;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #ffffff;
            padding: 10px 30px;
            font-size: 18px;
        }
        .death-link:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>なんかいろいろおいてある部屋</h1>

    <!-- 散乱している物（適当な位置に配置） -->
    <div class="scat-item" style="top: 20%; left: 15%;">壊れた椅子</div>
    <div class="scat-item" style="top: 25%; left: 70%;">破かれた日記</div>
    <div class="scat-item" style="top: 75%; left: 30%;">古い空き箱</div>
    <div class="scat-item" style="top: 60%; left: 80%;">ガラスの破片</div>

    <!-- 🧸 中央にぽつんと置いてある不気味な人形 -->
    <div class="doll" onclick="startScare()">🧸</div>

    <!-- 😱 人形を押した瞬間に飛び出す恐怖の画面（音なし） -->
    <div id="scare-screen">
        <div class="scare-text">ミツケタ</div>
        <a href="index.html" class="death-link">最初からやり直す</a>
    </div>

    <script>
        function startScare() {
            // びっくり画面をすぐに表示するだけ
            document.getElementById("scare-screen").style.display = "flex";
        }

        // デベロッパーツール対策
        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
