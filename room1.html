<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>最初の部屋</title>
    <style>
        html, body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'MS Mincho', 'serif';
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        .subtitle {
            color: #888888;
            font-size: 16px;
            margin-bottom: 60px;
        }

        /* 左右の部屋へ進むためのボタンエリア */
        .choice-container {
            display: flex;
            gap: 40px;
        }

        .choice-btn {
            color: #ffffff;
            text-decoration: none;
            font-size: 20px;
            border: 1px solid #444444;
            padding: 20px 50px;
            transition: 0.4s;
            background-color: #050505;
        }

        /* マウスを乗せた時の怪しい演出 */
        .choice-btn:hover {
            color: #ff0000;
            border-color: #ff0000;
            background-color: #1a0000;
            box-shadow: 0 0 15px #ff0000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>最初の部屋</h1>
    <div class="subtitle">――どこへ進みますか？――</div>

    <!-- 🗺️ マップ通りの分岐ボタン -->
    <div class="choice-container">
        <!-- クリックすると「右の部屋（right-room.html）」へ -->
        <a href="right-room.html" class="choice-btn">右の部屋</a>
        
        <!-- クリックすると「左の部屋（left-room.html）」へ -->
        <a href="left-room.html" class="choice-btn">左の扉</a>
    </div>

    <!-- デベロッパーツール対策 -->
    <script>
        window.addEventListener('keydown', function (e) {
            if (e.key === 'F12') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.key === 'I') { e.preventDefault(); return false; }
            if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
        });
    </script>

</body>
</html>
